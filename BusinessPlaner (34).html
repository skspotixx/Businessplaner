<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business-Planer - spotixx</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{--bg:#f7f7f8;--card:#fff;--border:#e5e5ea;--border-light:#f0f0f3;--text:#1a1a2e;--text-sec:#5a5a7a;--muted:#8e8ea0;--primary:#1a3c6e;--primary-light:#2a5aa0;--primary-bg:rgba(26,60,110,.06);--primary-border:rgba(26,60,110,.12);--green:#16a34a;--green-bg:rgba(22,163,74,.06);--green-border:rgba(22,163,74,.15);--red:#dc2626;--red-bg:rgba(220,38,38,.06);--red-border:rgba(220,38,38,.12);--amber:#b45309;--amber-bg:rgba(180,83,9,.06);--amber-border:rgba(180,83,9,.15);--blue:#2563eb;--blue-bg:rgba(37,99,235,.06);--blue-border:rgba(37,99,235,.12);--teal:#0d9488;--teal-bg:rgba(13,148,136,.06);--teal-border:rgba(13,148,136,.12);--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.08);--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:1300px;margin:0 auto;padding:20px 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.header h1{font-size:1.5rem;font-weight:800;color:var(--primary);letter-spacing:-.02em}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;box-shadow:var(--shadow);flex-wrap:wrap}
.tab{flex:1;padding:10px 14px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap;font-family:inherit;min-width:90px}
.tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,60,110,.25)}
.tab:hover:not(.active){background:var(--primary-bg);color:var(--primary)}
.badge{display:inline-block;margin-left:6px;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700}
.tab.active .badge{background:rgba(255,255,255,.25);color:#fff}
.tab:not(.active) .badge{background:var(--primary-bg);color:var(--primary)}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);width:100%;outline:none;transition:all .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,60,110,.08)}
input[readonly]{background:var(--border-light);color:var(--text-sec);cursor:not-allowed}
textarea{resize:vertical;min-height:60px}
label{display:block;font-size:11px;color:var(--text-sec);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.fg3{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 22px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:#fff;font-family:inherit}
.btn-p{background:var(--primary)}.btn-p:hover{background:var(--primary-light)}
.btn-r{background:var(--red)}.btn-r:hover{background:#b91c1c}
.btn-g{background:#6b7280}.btn-g:hover{background:#4b5563}
.btn-o{background:transparent;color:var(--primary);border:1.5px solid var(--primary-border)}.btn-o:hover{background:var(--primary-bg)}
.btn-s{padding:6px 14px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.chip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-border);margin:1px}
.chip-g{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.chip-r{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.chip-a{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.chip-sicher{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.chip-geplant{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.ir{display:flex;align-items:flex-start;gap:12px}
.ir-meta{flex:1;min-width:0;display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.ir-actions{flex-shrink:0;display:flex;gap:4px}
.ib{background:none;border:none;cursor:pointer;padding:6px;color:var(--muted);transition:all .2s;display:inline-flex;align-items:center;border-radius:6px}
.ib:hover{color:var(--primary);background:var(--primary-bg)}.ib.del:hover{color:var(--red);background:var(--red-bg)}
.st{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
.ov{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);padding:16px}
.md{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;box-shadow:0 25px 50px rgba(0,0,0,.12)}
.save-ind{position:fixed;top:12px;right:16px;z-index:200;font-size:11px;font-weight:600;padding:5px 12px;border-radius:8px;pointer-events:none;transition:opacity .3s}
.save-ind.saving{background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber);opacity:1}
.save-ind.saved{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);opacity:1}
.save-ind.hidden{opacity:0}
.plan-wrap{overflow-x:auto;margin-top:12px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:right;padding:8px 6px;color:var(--muted);font-weight:700;border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:var(--card)}
th:first-child{text-align:left;min-width:160px}
th.yr{background:var(--primary-bg);color:var(--primary)}
td{padding:7px 6px;text-align:right;font-family:monospace;font-size:11px;border-bottom:1px solid var(--border-light);white-space:nowrap}
td:first-child{text-align:left;color:var(--text-sec);font-family:inherit;font-weight:500}
tr:hover td{background:var(--primary-bg)}
tr.subtotal td{background:var(--primary-bg);font-weight:700;color:var(--primary);border-top:2px solid var(--primary-border)}
tr.grandtotal td{background:var(--primary);color:#fff;font-weight:800;font-size:12px}
tr.section-hdr td{background:var(--bg);color:var(--primary);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:10px 6px 4px}
tr.section-hdr.clickable{cursor:pointer}
tr.section-hdr.clickable:hover td{background:var(--primary-bg)}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.sum-card{border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.sum-card.rev{background:var(--green-bg);border-color:var(--green-border)}
.sum-card.cost{background:var(--red-bg);border-color:var(--red-border)}
.sum-card.ebit{background:var(--primary-bg);border-color:var(--primary-border)}
.sum-card.pers{background:var(--blue-bg);border-color:var(--blue-border)}
.sum-card h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.sum-card.rev h4{color:var(--green)}.sum-card.cost h4{color:var(--red)}.sum-card.ebit h4{color:var(--primary)}.sum-card.pers h4{color:var(--blue)}
.sum-card .val{font-size:20px;font-weight:800}
.sum-card.rev .val{color:var(--green)}.sum-card.cost .val{color:var(--red)}.sum-card.ebit .val{color:var(--primary)}.sum-card.pers .val{color:var(--blue)}
.sum-card .sub{font-size:10px;color:var(--muted);margin-top:2px}
.cw{position:relative;width:100%;height:320px}
.cw-sm{position:relative;width:100%;height:260px}
.yr-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.yr-tab{padding:6px 14px;border:1.5px solid var(--primary-border);border-radius:8px;background:transparent;color:var(--primary);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.yr-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;user-select:none}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;border-radius:22px;background:#d1d5db;transition:background .2s;cursor:pointer}
.toggle-slider::before{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:var(--blue)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px)}
.toggle-label{font-size:13px;font-weight:600;color:var(--text)}
.toggle-sub{font-size:11px;color:var(--muted)}
.prev-wrap{overflow-x:auto;max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin:12px 0}
.prev-wrap th{background:var(--bg);color:var(--text-sec);font-size:10px;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.prev-wrap td{text-align:left;padding:7px 10px;font-family:inherit}
.row-new td{background:var(--green-bg)}
.row-skip td{background:var(--bg);color:var(--muted)}
.row-err td{background:var(--red-bg);color:var(--red)}
.sbadge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.s-new{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.s-skip{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.s-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.radio-group{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
.radio-opt{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;user-select:none;flex:1;min-width:90px;justify-content:center}
.radio-opt.sel-aktiv{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.radio-opt.sel-ausgeschieden{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.radio-opt.sel-elternzeit{border-color:var(--amber);background:var(--amber-bg);color:var(--amber)}
.radio-opt input{display:none}
.sec-div{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.06em;padding:14px 0 6px;margin-top:6px;border-top:1px dashed var(--border);display:flex;align-items:center;gap:8px}
.sec-div::after{content:"";flex:1;height:1px;background:var(--border-light)}
.salary-panel{margin-top:10px;border-top:1px solid var(--border-light);padding-top:10px}
.sal-entry{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:12px;margin-bottom:6px}
.sal-entry.current{border-color:var(--blue-border);background:var(--blue-bg)}
.sal-entry.future{border-color:var(--green-border);background:var(--green-bg)}
.sal-entry.past{opacity:.65}
.sal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--muted)}
.sal-entry.current .sal-dot{background:var(--blue)}
.sal-entry.future .sal-dot{background:var(--green)}
.sal-amt{font-weight:800;font-family:monospace;font-size:13px;color:var(--muted)}
.sal-entry.current .sal-amt{color:var(--blue)}
.sal-entry.future .sal-amt{color:var(--green)}
.sal-period{font-size:10px;color:var(--muted);flex:1}
.sal-note{font-size:10px;color:var(--text-sec);font-style:italic}
.sal-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0}
.sal-badge.curr{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.sal-badge.fut{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.sal-badge.past{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.sal-add{background:var(--bg);border:1px dashed var(--blue-border);border-radius:8px;padding:12px;margin-top:8px}
.fak-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:var(--shadow)}
.fak-row.overdue{border-left:3px solid var(--red);background:var(--red-bg)}
.fak-row.today{border-left:3px solid var(--amber);background:var(--amber-bg)}
.fak-row.upcoming{border-left:3px solid var(--green)}
.fak-sec{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:12px 4px 6px;display:flex;align-items:center;gap:8px}
.fak-sec::after{content:"";flex:1;height:1px;background:var(--border)}
.fdb{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px}
.fdb.overdue{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.fdb.today{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.fdb.upcoming{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.fdb.future{background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-border)}
.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.fbi{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.ff{display:flex;flex-direction:column;gap:4px;min-width:140px;flex:1}
.ff label{font-size:10px;color:var(--text-sec);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:0}
.ff input,.ff select{padding:7px 10px;font-size:12px;height:34px}
.fat{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:8px;font-weight:700;background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-border);cursor:pointer;margin:2px}
.fat:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.cp-row{cursor:pointer}
.cp-row:hover td{background:var(--primary-bg)}
.cp-row.neg td{background:var(--red-bg)}
.cp-detail td{padding:0}
.cp-dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px}
.cp-dc{border-radius:10px;padding:14px;border:1px solid var(--border);background:var(--card)}
.cp-dc h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;color:var(--primary)}
.cp-di{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;gap:8px}
.cp-di span:first-child{color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.cp-warn{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.start-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.start-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.1);text-align:center}
.start-btn{width:100%;padding:14px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.start-btn-p{background:var(--primary);color:#fff}.start-btn-p:hover{background:var(--primary-light);transform:translateY(-1px)}
.start-btn-s{background:var(--bg);color:var(--primary);border:2px solid var(--primary-border)}.start-btn-s:hover{background:var(--primary-bg)}
.start-btn-r{background:var(--green-bg);color:var(--green);border:2px solid var(--green-border)}.start-btn-r:hover{background:var(--green-border)}
.start-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(255,255,255,.2)}
.start-btn-s .start-icon,.start-btn-r .start-icon{background:var(--primary-bg)}
.start-txt{text-align:left;flex:1}
.start-div{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:11px;font-weight:600}
.start-div::before,.start-div::after{content:"";flex:1;height:1px;background:var(--border)}
.start-err{background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);font-weight:600;margin-bottom:16px}
.start-note{font-size:11px;color:var(--muted);margin-top:20px;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);text-align:left;line-height:1.6}
.upgrade-notice{background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green);font-weight:600;margin-bottom:12px}
.pers-row-info{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:2px;gap:8px}
.pers-row-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
.pers-row-right{display:flex;align-items:center;gap:6px;flex-shrink:0;font-family:monospace;font-weight:800;font-size:13px;color:var(--blue)}
/* Gehalt-Masking */
.sal-hidden{filter:blur(6px);user-select:none;pointer-events:none}
.hide-sal-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1.5px solid var(--primary-border);background:transparent;color:var(--primary);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.hide-sal-btn:hover{background:var(--primary-bg)}
.hide-sal-btn.active{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
/* Cashplan scenario tabs */
.scen-tabs{display:flex;gap:4px;margin-bottom:12px}
.scen-tab{padding:6px 14px;border:1.5px solid var(--primary-border);border-radius:8px;background:transparent;color:var(--primary);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.scen-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
@media(max-width:640px){.fg2{grid-template-columns:1fr}.sum-grid{grid-template-columns:1fr}.ff{min-width:100%}.start-card{padding:32px 20px}.cp-dgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
"use strict";
var _R=React,useState=_R.useState,useMemo=_R.useMemo,useEffect=_R.useEffect,useRef=_R.useRef,useContext=_R.useContext,createContext=_R.createContext,h=_R.createElement,Fragment=_R.Fragment;

// ── Salary-Hide Context ───────────────────────────────────────────────────
var SalCtx=createContext(false);
function maskSal(v,hide){
  if(!hide)return v;
  return h("span",{className:"sal-hidden"},"●●●●●");
}
function maskStr(v,hide){
  if(!hide)return v;
  return "●●●●●";
}

// ── IDB ──────────────────────────────────────────────────────────────────
var IDB_NAME="BPlanerDB2",IDB_STORE="kv";
function openIDB(){
  return new Promise(function(res,rej){
    var req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore(IDB_STORE);};
    req.onsuccess=function(e){res(e.target.result);};
    req.onerror=function(e){rej(e.target.error);};
  });
}
function idbSet(key,val){
  return openIDB().then(function(db){
    var tx=db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).put(val,key);
    return new Promise(function(res,rej){tx.oncomplete=res;tx.onerror=rej;});
  }).catch(function(){});
}
function idbGet(key){
  return openIDB().then(function(db){
    var tx=db.transaction(IDB_STORE,"readonly");
    return new Promise(function(res,rej){
      var req=tx.objectStore(IDB_STORE).get(key);
      req.onsuccess=function(e){res(e.target.result||null);};

function getSalaryAt(history,dateStr){
  if(!history||!history.length)return null;
  var sorted=history.slice().sort(function(a,b){return a.validFrom<b.validFrom?-1:1;});
  var cur=null;
  for(var i=0;i<sorted.length;i++){
    var e=sorted[i];
    if(e.validFrom<=dateStr&&(!e.validTo||e.validTo>=dateStr))cur=e;
  }
  if(!cur){
    for(var j=0;j<sorted.length;j++){if(sorted[j].validFrom>dateStr)return sorted[j];}
    return sorted[sorted.length-1];
  }

}

function getMonths(sd,ed,iv,ps,tot){
  var p=new Date(ps);p.setDate(1);p.setHours(0,0,0,0);
  var s=sd?new Date(sd):new Date(p);s.setDate(1);s.setHours(0,0,0,0);
  var e=ed?new Date(ed):null;if(e){e.setDate(1);e.setHours(0,0,0,0);}
  var res=[];
  for(var m=0;m<tot;m++){
    var cur=new Date(p.getFullYear(),p.getMonth()+m,1);
    if(cur<s)continue;if(e&&cur>e)continue;
    var diff=(cur.getFullYear()-s.getFullYear())*12+(cur.getMonth()-s.getMonth());

}

function parseCSV(text){

  var data=lines.slice(1).map(function(line){

    for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){inQ=!inQ;}else if(c===sep&&!inQ){cols.push(cur.trim());cur="";}else{cur+=c;}}

// ── FakturierungTab ───────────────────────────────────────────────────────
function FakturierungTab(p){
  var td=today();
  var invoiceable=useMemo(function(){
    return p.revenues.filter(function(r){return r.nextInvoiceDate;}).sort(function(a,b){return a.nextInvoiceDate<b.nextInvoiceDate?-1:1;});
  },[p.revenues]);

  function statusOf(r){
    var diff=dayDiff(r.nextInvoiceDate,td);
    if(diff<0)return"overdue";
    if(diff===0)return"today";
    if(diff<=14)return"upcoming";
    return"future";
  }
  function markPaid(r){
    var next=advanceDate(r.nextInvoiceDate,r.invoiceInterval||r.interval||"monthly");
    p.updateRevenue(Object.assign({},r,{nextInvoiceDate:next||""}));
  }

  var sections=[{l:"Ueberfaellig",s:"overdue"},{l:"Heute",s:"today"},{l:"Naechste 14 Tage",s:"upcoming"},{l:"Spaeter",s:"future"}];

  return h("div",{className:"card"},
    h("div",{className:"st"},"Fakturierungsuebersicht"),
    invoiceable.length===0&&h("p",{style:{fontSize:12,color:"var(--muted)",textAlign:"center",padding:20}},"Keine Umsaetze mit Rechnungsdatum."),
    sections.map(function(sec){
      var rows=invoiceable.filter(function(r){return statusOf(r)===sec.s;});
      if(!rows.length)return null;
      return h("div",{key:sec.s,style:{marginBottom:16}},
        h("div",{className:"fak-sec"},sec.l," ("+rows.length+")"),
        rows.map(function(r){
          var st=statusOf(r);
          return h("div",{key:r.id,className:"fak-row "+st},
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}},
                h("span",{style:{fontWeight:700,fontSize:13}},r.customer),
                r.poNumber&&h("span",{style:{fontSize:11,padding:"2px 8px",borderRadius:6,background:"var(--primary-bg)",color:"var(--primary)",fontWeight:700}},r.poNumber),
                r.businessLine&&h("span",{className:"chip"},r.businessLine)
              ),
              h("div",{style:{fontSize:11,color:"var(--text-sec)"}},fmt(r.amount)+" \u00B7 "+ivLabel(r.invoiceInterval||r.interval))
            ),
            h("div",{style:{display:"flex",alignItems:"center",gap:8}},
              h("span",{className:"fdb "+st},fDS(r.nextInvoiceDate)),
              h("button",{className:"btn btn-p btn-s",onClick:function(){markPaid(r);}},"Abgerechnet \u2713")
            )
          );
        })
      );
    })
  );
}

      h("div",{className:"sum-card rev"},h("h4",null,"Einnahmen"),h("div",{className:"val"},fmt(totalIn)),h("div",{className:"sub"},"ab Stichtag")),
      h("div",{className:"sum-card cost"},h("h4",null,"Ausgaben"),h("div",{className:"val"},fmt(totalOut)),h("div",{className:"sub"},"Personal + Sachkosten + USt")),
      h("div",{className:"sum-card ebit"},h("h4",null,"Endkontostand"),h("div",{className:"val",style:{color:lastBal<0?"var(--red)":"var(--primary)"}},fmt(lastBal)),h("div",{className:"sub"},"Start: "+fmt(startBal))),
      warnings.length>0&&h("div",{className:"sum-card cost"},h("h4",null,"Warnungen"),h("div",{className:"val"},warnings.length),h("div",{className:"sub"},"Perioden mit neg. Saldo"))
    ),
    warnings.length>0&&h("div",{className:"cp-warn"},
      h("div",{style:{fontWeight:700,color:"var(--red)",marginBottom:4}},"Liquiditaetswarnung"),
      h("div",{style:{fontSize:11,color:"var(--red)"}},warnings.slice(0,5).map(function(g){return keyLabel(g.key)+": "+fmt(g.bal);}).join(" | "))
    ),
    h("div",{className:"card"},
      h("div",{style:{fontWeight:700,fontSize:13,color:"var(--primary)",marginBottom:8}},"Cashflow-Verlauf"),
      h("div",{className:"cw-sm"},h("canvas",{ref:chartRef}))
    ),
    h("div",{className:"card"},
      h("div",{style:{fontWeight:700,fontSize:13,color:"var(--primary)",marginBottom:12}},mode==="weekly"?"Wochendetails":"Monatsdetails"),
      groups.length===0&&h("p",{style:{fontSize:12,color:"var(--muted)",textAlign:"center",padding:20}},"Keine Daten fuer dieses Szenario."),
      h("div",{className:"plan-wrap"},
        h("table",null,
          h("thead",null,h("tr",null,
            h("th",{style:{textAlign:"left"}},mode==="weekly"?"Woche":"Monat"),
            h("th",null,"Einnahmen"),h("th",null,"Ausgaben"),h("th",null,"Netto"),h("th",null,"Kontostand")
          )),
          h("tbody",null,groups.map(function(g){
            var isExp=expanded===g.key;
            var neg=g.bal<0;
            return h(Fragment,{key:g.key},
              h("tr",{className:"cp-row"+(neg?" neg":""),onClick:function(){setExpanded(isExp?null:g.key);}},
                h("td",{style:{textAlign:"left",fontWeight:600}},keyLabel(g.key)+" "+(isExp?"▲":"▼")),
                h("td",{style:{color:"var(--green)",fontWeight:700}},fmt(g.inAmt)),
                h("td",{style:{color:"var(--red)",fontWeight:700}},fmt(g.outAmt)),
                h("td",{style:{color:g.net>=0?"var(--green)":"var(--red)",fontWeight:700}},fmt(g.net)),
                h("td",{style:{color:g.bal<0?"var(--red)":"var(--primary)",fontWeight:800}},fmt(g.bal))
              ),
              isExp&&h("tr",{className:"cp-detail"},
                h("td",{colSpan:5},
                  h("div",{className:"cp-dgrid"},
                    h("div",{className:"cp-dc"},
                      h("h4",null,"Einnahmen"),
                      g.evts.filter(function(e){return e.amount>0;}).map(function(e){
                        return h("div",{key:e.id,className:"cp-di"},
                          h("span",null,e.label),
                          h("span",{style:{color:"var(--green)",fontFamily:"monospace",fontWeight:700}},fmt(e.amount))
                        );
                      }),
                      g.evts.filter(function(e){return e.amount>0;}).length===0&&h("div",{style:{fontSize:11,color:"var(--muted)",fontStyle:"italic"}},"Keine")
                    ),
                    h("div",{className:"cp-dc"},
                      h("h4",null,"Ausgaben"),
                      g.evts.filter(function(e){return e.amount<0;}).map(function(e){
                        return h("div",{key:e.id,className:"cp-di"},
                          h("span",null,e.label),
                          h("span",{style:{color:"var(--red)",fontFamily:"monospace",fontWeight:700}},fmt(Math.abs(e.amount)))
                        );
                      }),
                      g.evts.filter(function(e){return e.amount<0;}).length===0&&h("div",{style:{fontSize:11,color:"var(--muted)",fontStyle:"italic"}},"Keine")
                    )
                  )
                )
              )
            );
          }))
        )
      )
    )
  );
}

// ── StartScreen ───────────────────────────────────────────────────────────
function StartScreen(p){
  var s1=useState(null),err=s1[0],setErr=s1[1];

  async function openExisting(){
    if(!hasFileAPI){setErr("Bitte Chrome oder Edge verwenden.");return;}
    try{
      var handles=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
      var handle=handles[0];
      var text=await readHandle(handle);
      var data=JSON.parse(text);
      await idbSet("fh",handle);
      p.onLoaded(data,handle,handle.name);
    }catch(e){if(e.name!=="AbortError")setErr("Fehler: "+e.message);}
  }

  async function createNew(){
    if(!hasFileAPI){setErr("Bitte Chrome oder Edge verwenden.");return;}
    try{
      var handle=await window.showSaveFilePicker({suggestedName:"businessplan.json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
      var empty={revenues:[],personnel:[],sachkosten:[],planStart:new Date().getFullYear()+"-01-01",planMonths:60};
      await writeHandle(handle,JSON.stringify(empty,null,2));
      await idbSet("fh",handle);
      p.onLoaded(empty,handle,handle.name);
    }catch(e){if(e.name!=="AbortError")setErr("Fehler: "+e.message);}
  }

  async function openRecent(){
    if(!p.recent)return;
    try{
      var perm=await p.recent.queryPermission({mode:"readwrite"});
      if(perm!=="granted")perm=await p.recent.requestPermission({mode:"readwrite"});
      if(perm!=="granted"){setErr("Berechtigung verweigert.");return;}
      var text=await readHandle(p.recent);
      var data=JSON.parse(text);
      p.onLoaded(data,p.recent,p.recent.name);
    }catch(e){setErr("Fehler: "+e.message);}
  }

  return h("div",{className:"start-screen"},
    h("div",{className:"start-card"},
      h("div",{style:{fontSize:"2.2rem",fontWeight:800,color:"var(--primary)",letterSpacing:"-.03em",marginBottom:4}},"Business-Planer"),
      h("div",{style:{fontSize:13,color:"var(--muted)",marginBottom:36}},"spotixx GmbH"),
      err&&h("div",{className:"start-err"},err),
      !hasFileAPI&&h("div",{style:{background:"var(--amber-bg)",border:"2px solid var(--amber-border)",borderRadius:12,padding:20,marginBottom:20}},
        h("div",{style:{color:"var(--amber)",fontWeight:700,marginBottom:4}},"Browser nicht unterstuetzt"),
        h("div",{style:{color:"var(--text-sec)",fontSize:12}},"Bitte Chrome oder Edge verwenden.")
      ),
      p.recent&&h("button",{className:"start-btn start-btn-r",onClick:openRecent},
        h("span",{className:"start-icon"},"📂"),
        h("div",{className:"start-txt"},
          h("div",{style:{fontWeight:700}},"Zuletzt geoeffnet"),
          h("div",{style:{fontSize:11,opacity:.75}},p.recent.name||"businessplan.json")
        )
      ),
      h("div",{className:"start-div"},"oder"),
      h("button",{className:"start-btn start-btn-p",onClick:createNew},
        h("span",{className:"start-icon"},"✨"),
        h("div",{className:"start-txt"},
          h("div",{style:{fontWeight:700}},"Neue Planungsdatei erstellen"),
          h("div",{style:{fontSize:11,opacity:.75}},"Leere JSON-Datei anlegen")
        )
      ),
      h("button",{className:"start-btn start-btn-s",onClick:openExisting},
        h("span",{className:"start-icon"},"📁"),
        h("div",{className:"start-txt"},
          h("div",{style:{fontWeight:700}},"Bestehende Datei oeffnen"),
          h("div",{style:{fontSize:11,opacity:.75}},"JSON-Datei laden")
        )
      ),
      h("div",{className:"start-note"},"Tipp: Lege die JSON-Datei auf OneDrive oder einem Netzlaufwerk ab – so greifen alle Teammitglieder auf dieselben Daten zu.")
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App(){
  var s1=useState(null),fh=s1[0],setFH=s1[1];
  var s2=useState(""),fn=s2[0],setFN=s2[1];
  var s3=useState(null),recent=s3[0],setRecent=s3[1];
  var s4=useState(false),ready=s4[0],setReady=s4[1];
  var s5=useState(0),tab=s5[0],setTab=s5[1];
  var s6=useState([]),revenues=s6[0],setRevenues=s6[1];
  var s7=useState([]),personnel=s7[0],setPersonnel=s7[1];
  var s8=useState([]),sachkosten=s8[0],setSachkosten=s8[1];
  var s9=useState(new Date().getFullYear()+"-01-01"),planStart=s9[0],setPlanStart=s9[1];
  var s10=useState(60),planMonths=s10[0],setPlanMonths=s10[1];
  var s11=useState(null),logo=s11[0],setLogo=s11[1];
  var s12=useState("hidden"),saveState=s12[0],setSaveState=s12[1];
  var s13=useState(false),hideSal=s13[0],setHideSal=s13[1];
  var saveTimer=useRef(null);
  var firstLoad=useRef(true);

  useEffect(function(){
    idbGet("fh").then(function(h2){if(h2)setRecent(h2);});
    idbGet("logo").then(function(b64){if(b64)setLogo(b64);});
    setReady(true);
  },[]);

  function onLoaded(data,handle,name){
    setRevenues(data.revenues||[]);
    setPersonnel(data.personnel||[]);
    setSachkosten(data.sachkosten||[]);
    setPlanStart(data.planStart||new Date().getFullYear()+"-01-01");
    setPlanMonths(data.planMonths||60);
    setFH(handle);setFN(name);
    firstLoad.current=false;
  }

  function doSave(){
    if(!fh)return;
    setSaveState("saving");
    var data={revenues:revenues,personnel:personnel,sachkosten:sachkosten,planStart:planStart,planMonths:planMonths};
    writeHandle(fh,JSON.stringify(data,null,2)).then(function(){
      setSaveState("saved");
      clearTimeout(saveTimer.current);
      saveTimer.current=setTimeout(function(){setSaveState("hidden");},2000);
    }).catch(function(){setSaveState("hidden");});
  }

  useEffect(function(){
    if(firstLoad.current||!fh)return;
    setSaveState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(doSave,1200);
    return function(){clearTimeout(saveTimer.current);};
  },[revenues,personnel,sachkosten,planStart,planMonths,fh]);

  async function onNewFile(){
    try{
      var handle=await window.showSaveFilePicker({suggestedName:"businessplan.json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
      var empty={revenues:[],personnel:[],sachkosten:[],planStart:planStart,planMonths:planMonths};
      await writeHandle(handle,JSON.stringify(empty,null,2));
      await idbSet("fh",handle);
      setRevenues([]);setPersonnel([]);setSachkosten([]);
      setFH(handle);setFN(handle.name);
    }catch(e){if(e.name!=="AbortError")console.error(e);}
  }
  async function onOpenFile(){
    try{
      var handles=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
      var handle=handles[0];
      var text=await readHandle(handle);
      var data=JSON.parse(text);
      await idbSet("fh",handle);
      onLoaded(data,handle,handle.name);
    }catch(e){if(e.name!=="AbortError")console.error(e);}
  }

  function addRev(item){setRevenues(function(p){return p.concat([Object.assign({},item,{id:item.id||uid()})]);});}
  function updRev(item){setRevenues(function(p){return p.map(function(r){return r.id===item.id?item:r;});});}
  function delRev(id){setRevenues(function(p){return p.filter(function(r){return r.id!==id;});});}
  function addPers(item){setPersonnel(function(p){return p.concat([Object.assign({},item,{id:item.id||uid()})]);});}
  function updPers(item){setPersonnel(function(p){return p.map(function(r){return r.id===item.id?item:r;});});}
  function delPers(id){setPersonnel(function(p){return p.filter(function(r){return r.id!==id;});});}
  function addSach(item){setSachkosten(function(p){return p.concat([Object.assign({},item,{id:item.id||uid()})]);});}
  function updSach(item){setSachkosten(function(p){return p.map(function(r){return r.id===item.id?item:r;});});}
  function delSach(id){setSachkosten(function(p){return p.filter(function(r){return r.id!==id;});});}

  if(!ready)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}},h("div",{style:{width:32,height:32,border:"3px solid var(--border)",borderTopColor:"var(--primary)",borderRadius:"50%",animation:"spin .8s linear infinite"}}));
  if(!fh)return h(StartScreen,{recent:recent,onLoaded:onLoaded});

  var content=null;
  if(tab===0)content=h(EinstellungenTab,{planStart:planStart,setPlanStart:setPlanStart,planMonths:planMonths,setPlanMonths:setPlanMonths,logo:logo,setLogo:setLogo,fileHandle:fh,fileName:fn,onNewFile:onNewFile,onOpenFile:onOpenFile,onSave:doSave});
  else if(tab===1)content=h(UmsaetzeTab,{revenues:revenues,planStart:planStart,onAdd:addRev,onUpdate:updRev,onDelete:delRev});
  else if(tab===2)content=h(PersonalkostenTab,{personnel:personnel,planStart:planStart,onAdd:addPers,onUpdate:updPers,onDelete:delPers});
  else if(tab===3)content=h(SachkostenTab,{sachkosten:sachkosten,planStart:planStart,onAdd:addSach,onUpdate:updSach,onDelete:delSach});
  else if(tab===4)content=h(BusinessplanTab,{revenues:revenues,personnel:personnel,sachkosten:sachkosten,planStart:planStart,planMonths:planMonths});
  else if(tab===5)content=h(FakturierungTab,{revenues:revenues,updateRevenue:updRev});
  else if(tab===6)content=h(CashplanTab,{revenues:revenues,personnel:personnel,sachkosten:sachkosten,planStart:planStart,planMonths:planMonths});

  return h(SalCtx.Provider,{value:hideSal},
    h("div",{className:"container"},
      h("style",null,"@keyframes spin{to{transform:rotate(360deg)}}"),
      h("div",{className:"save-ind "+saveState},saveState==="saving"?"Speichern...":"Gespeichert \u2713"),
      h("div",{className:"header"},
        logo&&h("img",{src:logo,style:{height:44,borderRadius:8,border:"1px solid var(--border)",padding:4,background:"#fff"}}),
        h("div",{style:{flex:1}},
          h("h1",null,"Business-Planer"),
          h("p",{style:{fontSize:12,color:"var(--muted)",fontWeight:500}},fn||"spotixx GmbH")
        ),
        h("button",{
          className:"hide-sal-btn"+(hideSal?" active":""),
          onClick:function(){setHideSal(function(v){return !v;});}
        },hideSal?"\uD83D\uDD13 Gehaelter einblenden":"\uD83D\uDD12 Gehaelter ausblenden")
      ),
      h("div",{className:"tabs"},
        TABS.map(function(t,i){
          var badge=i===1?revenues.length:i===2?personnel.length:i===3?sachkosten.length:null;
          return h("button",{key:i,className:"tab"+(tab===i?" active":""),onClick:function(){setTab(i);}},
            t,
            badge!=null&&h("span",{className:"badge"},badge)
          );
        })
      ),
      content
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
